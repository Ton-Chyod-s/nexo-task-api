app = "nexo-task-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "5050"
  TZ = "America/Campo_Grande"

[http_service]
  internal_port = 5050
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
